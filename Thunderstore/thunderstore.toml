[config]
schemaVersion = "0.0.1"

[general]
repository = "https://thunderstore.io"

[package]
namespace = "seechela"
name = "Camera_Overhaul"
description = "Satisfying movement through dynamic camera rotations."
websiteUrl = "https://github.com/se3ya/LC-CameraOverhaul"
containsNswContent = false

[package.dependencies]
BepInEx-BepInExPack = "5.4.2305"

[build]
icon = "./icon.gif"
readme = "./README.md"
outdir = "./build"

[[build.copy]]
source = "../Plugin/CameraOverhaul/bin/Release/netstandard2.1/CameraOverhaul.dll"
target = "BepInEx/plugins/CameraOverhaul/CameraOverhaul.dll"

[[build.copy]]
source = "./CHANGELOG.md"
target = "/"